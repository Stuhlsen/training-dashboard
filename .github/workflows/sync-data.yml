# .github/workflows/sync-data.yml
# Generiert rides.json aus Notion (Plan 1) und intervals.icu (Plan 2)
# und committed es ins Repo. GitHub Pages serviert es dann statisch.
#
# Benötigte Secrets (Settings → Secrets → Actions):
#   NOTION_API_KEY      — Notion Integration Token
#   NOTION_DATABASE_ID  — Plan 1 Trainingsdatenbank-ID
#   INTERVALS_API_KEY   — intervals.icu API Key
#   INTERVALS_ATHLETE_ID — intervals.icu Athlete ID

name: Sync Training Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
    paths: [".github/workflows/sync-data.yml", "scripts/generate-data.js"]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate rides.json from Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
        run: node scripts/generate-data.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rides.json data/wellness.json 2>/dev/null || true
          # subjective.json wird NIE von der Action committed — nur per Dashboard
          git diff --staged --quiet || git commit -m "chore: update training data"
          git push
