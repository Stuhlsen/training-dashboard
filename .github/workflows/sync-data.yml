# .github/workflows/sync-data.yml
# Generiert rides.json aus Notion (Plan 1) und intervals.icu (Plan 2),
# committed die Daten und deployt GitHub Pages.
#
# Struktur: getrennte Jobs "sync" (Daten erzeugen + committen + Artefakt
# hochladen) und "deploy" (nur deploy-pages). Grund: Upload und Deploy im
# selben Job dupliziert bei einem Re-Run das "github-pages"-Artefakt
# ("Multiple artifacts named github-pages... count is 2"). Getrennt re-runnt
# "Re-run failed jobs" nur den Deploy — kein zweiter Upload.
#
# Benötigte Secrets (Settings → Secrets → Actions):
#   NOTION_API_KEY        — Notion Integration Token
#   NOTION_DATABASE_ID    — Plan 1 Trainingsdatenbank-ID
#   INTERVALS_API_KEY     — intervals.icu API Key (Athlet 1)
#   INTERVALS_ATHLETE_ID  — intervals.icu Athlete ID (Athlet 1)
#   INTERVALS_API_KEY_2   — intervals.icu API Key (Athlet 2, optional — Vergleichsdaten)
#   INTERVALS_ATHLETE_ID_2 — intervals.icu Athlete ID (Athlet 2, optional)
#   WEATHER_LAT / WEATHER_LON     — Standort Athlet 1 (Breitengrad/Längengrad, privat)
#   WEATHER_LAT_2 / WEATHER_LON_2 — Standort Athlet 2 (optional, privat)

name: Sync Training Data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches: [main]
    paths:
      - ".github/workflows/sync-data.yml"
      - "scripts/generate-data.js"
      - "data/adjustments.json"
      - "data/subjective.json"
      - "data/adjustments-2.json"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 1) Daten erzeugen, committen und das Pages-Artefakt hochladen
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate rides.json
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          INTERVALS_API_KEY: ${{ secrets.INTERVALS_API_KEY }}
          INTERVALS_ATHLETE_ID: ${{ secrets.INTERVALS_ATHLETE_ID }}
          INTERVALS_API_KEY_2: ${{ secrets.INTERVALS_API_KEY_2 }}
          INTERVALS_ATHLETE_ID_2: ${{ secrets.INTERVALS_ATHLETE_ID_2 }}
          WEATHER_LAT: ${{ secrets.WEATHER_LAT }}
          WEATHER_LON: ${{ secrets.WEATHER_LON }}
          WEATHER_LAT_2: ${{ secrets.WEATHER_LAT_2 }}
          WEATHER_LON_2: ${{ secrets.WEATHER_LON_2 }}
        run: node scripts/generate-data.js

      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout origin/main -- data/adjustments.json data/subjective.json
          # adjustments-2.json (Athlet 2) existiert erst, sobald einmal committet —
          # git checkout würde ohne diesen Existenz-Check auf einem frischen Stand
          # fehlschlagen (Datei noch nicht auf origin/main vorhanden).
          git cat-file -e origin/main:data/adjustments-2.json 2>/dev/null && \
            git checkout origin/main -- data/adjustments-2.json
          git add data/rides.json data/adjustments.json data/subjective.json
          [ -f data/rides-2.json ] && git add data/rides-2.json
          [ -f data/adjustments-2.json ] && git add data/adjustments-2.json
          git diff --staged --quiet || git commit -m "chore: update training data [skip ci]"
          for i in 1 2 3; do
            git fetch origin
            git rebase origin/main && git push && break
            echo "Push failed, retrying in 5s..."
            sleep 5
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  # 2) Nur Deploy — bei transientem Fehler isoliert re-runnbar (kein Re-Upload)
  deploy:
    needs: sync
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
